name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-build-secret-with-sufficient-length-for-validation
      API_KEY_SECRET: ci-test-api-key-secret-long
      DISABLE_SQLITE_AUTO_BACKUP: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint || true

      - name: Run tests
        run: |
          pnpm exec cross-env DISABLE_SQLITE_AUTO_BACKUP=true node --import tsx/esm --test \
            tests/unit/token-budget.test.ts \
            tests/unit/chat-helpers.test.ts \
            tests/unit/chat-route-edge-cases.test.ts \
            tests/unit/combo-stream-readiness-fallback.test.ts

      - name: Build application
        run: pnpm run build

      - name: Test build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found"
            exit 1
          fi
          echo "Build successful"
